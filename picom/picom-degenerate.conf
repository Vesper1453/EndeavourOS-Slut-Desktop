# 🔥💦 DEGENERATE PICOM CONFIG - 85% TRANSPARENCY 💋🍆
# Maximum opacity, cum-stained blur effects

# === SHADOWS ===
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.5;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c"
];

# === TRANSPARENCY / OPACITY ===
# 85% opacity = 15% transparent (0.15 inactive, 0.85 active)
inactive-opacity = 0.15;
active-opacity = 0.85;
frame-opacity = 0.85;

# === FADING ===
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 5;

# === BLUR ===
blur-method = "dual_kawase";
blur-strength = 10;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Firefox' && argb",
    "_GTK_FRAME_EXTENTS@:c"
];

# === CORNERS ===
corner-radius = 12;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# === OPACITY RULES - FILTHY WINDOWS ===
opacity-rule = [
    "85:class_g = 'kitty' && focused",
    "15:class_g = 'kitty' && !focused",
    "85:class_g = 'Alacritty' && focused",
    "15:class_g = 'Alacritty' && !focused",
    "85:class_g = 'Firefox' && focused",
    "20:class_g = 'Firefox' && !focused",
    "85:class_g = 'Thunderbird' && focused",
    "20:class_g = 'Thunderbird' && !focused",
    "95:class_g = 'mpv'",
    "95:class_g = 'VLC'",
    "0:_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
    "0:_NET_WM_STATE@:32a *= '_NET_WM_STATE_STICKY'"
];

# === GENERAL SETTINGS ===
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
sw-opti = false;
unredir-if-possible = false;
focus-exclude = [ ];

# === ANIMATIONS (if using picom-animations) ===
animation-dampening = 0.5;
animation-window-mass = 0.5;
animation-delta = 5;
animation-stiffness = 200;

# === LOG LEVEL ===
log-level = "warn";
