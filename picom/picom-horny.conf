# 💦💋 HORNY PICOM CONFIG - 70% TRANSPARENCY 💕🌹
# Sensual blur effects, less extreme than Degenerate

# === SHADOWS ===
shadow = true;
shadow-radius = 8;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.3;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c"
];

# === TRANSPARENCY / OPACITY ===
# 70% opacity = 30% transparent
inactive-opacity = 0.30;
active-opacity = 0.70;
frame-opacity = 0.70;

# === FADING ===
fading = true;
fade-in-step = 0.07;
fade-out-step = 0.07;
fade-delta = 6;

# === BLUR ===
blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Firefox' && argb",
    "_GTK_FRAME_EXTENTS@:c"
];

# === CORNERS ===
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# === OPACITY RULES - SENSUAL WINDOWS ===
opacity-rule = [
    "70:class_g = 'kitty' && focused",
    "30:class_g = 'kitty' && !focused",
    "70:class_g = 'Alacritty' && focused",
    "30:class_g = 'Alacritty' && !focused",
    "70:class_g = 'Firefox' && focused",
    "35:class_g = 'Firefox' && !focused",
    "70:class_g = 'Thunderbird' && focused",
    "35:class_g = 'Thunderbird' && !focused",
    "100:class_g = 'mpv'",
    "100:class_g = 'VLC'",
    "0:_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
    "0:_NET_WM_STATE@:32a *= '_NET_WM_STATE_STICKY'"
];

# === GENERAL SETTINGS ===
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
sw-opti = false;
unredir-if-possible = false;
focus-exclude = [ ];

# === ANIMATIONS (if using picom-animations) ===
animation-dampening = 0.5;
animation-window-mass = 0.5;
animation-delta = 5;
animation-stiffness = 200;

# === LOG LEVEL ===
log-level = "warn";
