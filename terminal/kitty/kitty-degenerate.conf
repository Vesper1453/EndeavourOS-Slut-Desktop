# 🍆💦 DEGENERATE KITTY CONFIG - MAXIMUM FILTH 💋🔥
# Deep pink/purple cum-stained terminal

# === FONTS ===
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# === COLORS - DEGENERATE PALETTE ===
background #0d0208
foreground #ff1493

# Black
color0  #1a0a12
color8  #2d1b22

# Red (Hot pink)
color1  #ff0066
color9  #ff3385

# Green (Deep magenta)
color2  #990066
color10 #cc0088

# Yellow (Pink gold)
color3  #ff66b2
color11 #ff99cc

# Blue (Purple)
color4  #9933ff
color12 #b366ff

# Magenta (Hot)
color5  #ff00cc
color13 #ff33dd

# Cyan (Light pink)
color6  #ff80bf
color14 #ffb3d9

# White
color7  #ffb3d9
color15 #ffe6f2

# === CURSOR ===
cursor #ff1493
cursor_shape beam
cursor_blink_interval 0.5

# === SCROLLBACK ===
scrollback_lines 10000

# === OPACITY (CUM-STAINED) ===
background_opacity 0.85

# === WINDOW ===
window_padding_width 4
window_margin_width 0
hide_window_decorations no

# === TAB BAR ===
tab_bar_style slant
tab_title_template {title}{' :{num_windows}' if num_windows > 1 else ''}
active_tab_foreground   #ff1493
active_tab_background   #1a0a12
active_tab_font_style   bold
inactive_tab_foreground #993366
inactive_tab_background #0d0208
inactive_tab_font_style normal

# === URL ===
url_color #ff66b2
url_style curly

# === BELL ===
enable_audio_bell no
visual_bell_duration 0.0

# === PERFORMANCE ===
sync_to_monitor yes
repaint_delay 10
input_delay 3

# === ADVANCED ===
shell zsh
editor nano
close_on_child_death no
allow_remote_control yes
listen_on unix:/tmp/kitty
dynamic_background_opacity yes

# === KEY MAPPINGS ===
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left prev_tab
map ctrl+shift+l next_layout
map ctrl+shift+equal increase_font_size
map ctrl+shift+minus decrease_font_size
map ctrl+shift+0 restore_font_size

# === SLUTTY CUSTOM KEYBINDINGS ===
# Hotkey to switch terminal modes
map ctrl+shift+f1 exec --no-startup-id ~/.config/kitty/scripts/switch-mode degenerate
map ctrl+shift+f2 exec --no-startup-id ~/.config/kitty/scripts/switch-mode horny
map ctrl+shift+f3 exec --no-startup-id ~/.config/kitty/scripts/switch-mode normal

# === CUM STAIN EFFECT ===
# Background image for extra degeneracy (optional - uncomment if you have a bg image)
# background_image ~/.config/kitty/wallpapers/cum-stained.png
# background_image_layout cscaled
# background_tint 0.9
