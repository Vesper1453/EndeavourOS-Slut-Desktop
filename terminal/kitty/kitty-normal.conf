# ✨ NORMAL KITTY CONFIG - CLEAN & PROFESSIONAL 🖥️
# Standard Linux terminal experience

# === FONTS ===
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# === COLORS - CLEAN PALETTE ===
background #1a1a1a
foreground #f0f0f0

# Black
color0  #1a1a1a
color8  #4a4a4a

# Red
color1  #e74c3c
color9  #ff6b6b

# Green
color2  #27ae60
color10 #2ecc71

# Yellow
color3  #f39c12
color11 #f1c40f

# Blue
color4  #3498db
color12 #5dade2

# Magenta
color5  #9b59b6
color13 #bb8fce

# Cyan
color6  #1abc9c
color14 #76d7c4

# White
color7  #bdc3c7
color15 #ecf0f1

# === CURSOR ===
cursor #3498db
cursor_shape block
cursor_blink_interval 1.0

# === SCROLLBACK ===
scrollback_lines 10000

# === OPACITY (NO TRANSPARENCY) ===
background_opacity 1.0

# === WINDOW ===
window_padding_width 4
window_margin_width 0
hide_window_decorations no

# === TAB BAR ===
tab_bar_style powerline
tab_title_template {title}{' :{num_windows}' if num_windows > 1 else ''}
active_tab_foreground   #1a1a1a
active_tab_background   #3498db
active_tab_font_style   bold
inactive_tab_foreground #bdc3c7
inactive_tab_background #4a4a4a
inactive_tab_font_style normal

# === URL ===
url_color #3498db
url_style curly

# === BELL ===
enable_audio_bell yes
visual_bell_duration 0.0

# === PERFORMANCE ===
sync_to_monitor yes
repaint_delay 10
input_delay 3

# === ADVANCED ===
shell zsh
editor nano
close_on_child_death no

# === KEY MAPPINGS ===
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left prev_tab
map ctrl+shift+l next_layout
map ctrl+shift+equal increase_font_size
map ctrl+shift+minus decrease_font_size
map ctrl+shift+0 restore_font_size

# Mode switch keybindings
map ctrl+shift+f1 exec --no-startup-id ~/.config/kitty/scripts/switch-mode degenerate
map ctrl+shift+f2 exec --no-startup-id ~/.config/kitty/scripts/switch-mode horny
map ctrl+shift+f3 exec --no-startup-id ~/.config/kitty/scripts/switch-mode normal
